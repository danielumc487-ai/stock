<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>股票分析面板</title>
    <style>
:root {
  color-scheme: dark;
  --bg: #050711;
  --panel: rgba(38, 55, 112, 0.78);
  --panel-strong: rgba(72, 78, 150, 0.82);
  --line: rgba(178, 203, 255, 0.22);
  --text: #eef4ff;
  --muted: #afbfdf;
  --green: #31d843;
  --yellow: #ffd85a;
  --blue: #75a2ff;
  --red: #ff6f7f;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(circle at 20% 0%, rgba(61, 92, 180, 0.28), transparent 34%),
    linear-gradient(180deg, #03040a 0%, #091124 100%);
  color: var(--text);
  font-family:
    Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
    sans-serif;
}

button,
input {
  font: inherit;
}

.app-shell {
  width: min(1180px, calc(100% - 32px));
  margin: 0 auto;
  padding: 32px 0;
}

.hero-panel,
.section-panel {
  border: 1px solid rgba(160, 185, 255, 0.32);
  background:
    linear-gradient(180deg, rgba(93, 91, 167, 0.82), rgba(31, 54, 115, 0.9)),
    var(--panel);
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.22),
    0 24px 70px rgba(0, 0, 0, 0.32);
  border-radius: 8px;
}

.hero-panel {
  padding: 28px;
}

.section-panel {
  margin-top: 18px;
  padding: 24px 28px 28px;
}

.section-panel.compact {
  padding-bottom: 24px;
}

.topbar,
.panel-title,
.quote-header,
.search-row,
.chips,
.price-row {
  display: flex;
  align-items: center;
}

.topbar,
.panel-title,
.quote-header,
.price-row {
  justify-content: space-between;
  gap: 18px;
}

.eyebrow,
.muted,
.panel-title p,
.market-clock,
.stat-grid span,
.analysis-text {
  color: var(--muted);
}

.eyebrow {
  margin: 0 0 4px;
  font-size: 0.78rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

h1,
h2,
p {
  margin-top: 0;
}

h1 {
  margin-bottom: 0;
  font-size: clamp(2rem, 5vw, 4.6rem);
  line-height: 0.95;
  letter-spacing: 0;
}

h2 {
  margin-bottom: 0;
  font-size: 1.15rem;
}

.market-clock {
  text-align: right;
}

.market-clock span,
.market-clock strong {
  display: block;
}

.market-clock span {
  margin-bottom: 4px;
  font-size: 1.55rem;
  color: var(--text);
}

.search-card {
  margin: 28px 0;
  padding: 18px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(8, 15, 35, 0.36);
}

.search-card label {
  display: block;
  margin-bottom: 10px;
  color: #d7e3ff;
  font-weight: 700;
}

.search-row {
  gap: 10px;
}

input {
  width: 100%;
  min-width: 0;
  height: 46px;
  border: 1px solid rgba(195, 213, 255, 0.28);
  border-radius: 8px;
  background: rgba(3, 7, 18, 0.46);
  color: var(--text);
  padding: 0 14px;
  outline: none;
}

input:focus {
  border-color: rgba(138, 174, 255, 0.86);
  box-shadow: 0 0 0 3px rgba(117, 162, 255, 0.16);
}

button {
  min-width: 72px;
  height: 46px;
  border: 0;
  border-radius: 8px;
  padding: 0 20px;
  color: #07111f;
  background: #dce8ff;
  font-weight: 800;
  white-space: nowrap;
  cursor: pointer;
}

button:disabled {
  cursor: wait;
  opacity: 0.68;
}

.ghost-button {
  border: 1px solid rgba(190, 210, 255, 0.25);
  color: #dbe6ff;
  background: rgba(255, 255, 255, 0.07);
}

.data-status {
  margin: 10px 0 0;
  color: #c7d6f6;
  font-size: 0.92rem;
}

.chips {
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
}

.chip {
  height: 32px;
  border: 1px solid rgba(190, 210, 255, 0.25);
  border-radius: 999px;
  padding: 0 12px;
  color: #dbe6ff;
  background: rgba(255, 255, 255, 0.07);
  cursor: pointer;
}

.chip.active {
  color: #061020;
  background: var(--blue);
}

.dashboard-grid {
  display: grid;
  grid-template-columns: minmax(260px, 0.88fr) minmax(300px, 1.42fr);
  gap: 18px;
}

.quote-panel,
.chart-panel {
  min-width: 0;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(9, 16, 39, 0.34);
  padding: 20px;
}

.symbol-pill,
.panel-title span,
#riskTag {
  flex: 0 0 auto;
  border: 1px solid rgba(185, 207, 255, 0.24);
  border-radius: 999px;
  padding: 6px 10px;
  color: #d6e3ff;
  background: rgba(255, 255, 255, 0.06);
  font-size: 0.82rem;
}

.price-row {
  margin: 24px 0;
}

.price-row strong {
  font-size: clamp(2.4rem, 8vw, 5rem);
  line-height: 0.9;
}

.price-row span {
  color: var(--green);
  font-weight: 800;
}

.price-row span.negative {
  color: var(--red);
}

.stat-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.stat-grid div {
  min-height: 86px;
  border: 1px solid rgba(180, 205, 255, 0.18);
  border-radius: 8px;
  padding: 14px;
  background: rgba(255, 255, 255, 0.045);
}

.stat-grid span,
.stat-grid strong {
  display: block;
}

.stat-grid strong {
  margin-top: 8px;
  font-size: 1.35rem;
}

canvas {
  display: block;
  width: 100%;
  height: min(330px, 42vh);
  margin-top: 14px;
}

.table-wrap {
  overflow-x: auto;
}

table {
  width: 100%;
  min-width: 620px;
  border-collapse: collapse;
}

th,
td {
  padding: 18px 14px;
  text-align: left;
  border-bottom: 1px dashed rgba(185, 207, 255, 0.27);
}

th {
  color: #bed0f1;
  font-size: 0.98rem;
}

td {
  font-size: 1.16rem;
}

.company-cell {
  display: flex;
  align-items: center;
  gap: 12px;
  font-weight: 800;
}

.dot {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  box-shadow: 0 0 16px currentColor;
}

.percent {
  color: var(--green);
  font-weight: 800;
}

.status-low {
  color: #dbe5ff;
}

.status-mid {
  color: var(--yellow);
}

.status-high {
  color: var(--red);
}

.analysis-text {
  margin: 16px 0 0;
  max-width: 920px;
  line-height: 1.75;
}

@media (max-width: 760px) {
  .app-shell {
    width: min(100% - 20px, 1180px);
    padding: 18px 0;
  }

  .hero-panel,
  .section-panel {
    padding: 18px;
  }

  .topbar,
  .panel-title,
  .price-row {
    align-items: flex-start;
    flex-direction: column;
  }

  .market-clock {
    text-align: left;
  }

  .search-row,
  .dashboard-grid {
    grid-template-columns: 1fr;
  }

  .search-row {
    align-items: stretch;
    flex-direction: column;
  }

  button {
    width: 100%;
  }

  .dashboard-grid,
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr;
  }

  th,
  td {
    padding: 13px 5px;
    font-size: 0.92rem;
  }

  table {
    min-width: 0;
  }

  .company-cell {
    gap: 8px;
  }

  .dot {
    width: 14px;
    height: 14px;
  }
}

</style>
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-panel">
        <div class="topbar">
          <div>
            <p class="eyebrow">Stock Lens</p>
            <h1>股票分析面板</h1>
          </div>
          <div class="market-clock">
            <span id="todayLabel">--</span>
            <strong>当前横截面</strong>
          </div>
        </div>

        <form class="search-card" id="stockForm">
          <label for="symbolInput">输入股票代码</label>
          <div class="search-row">
            <input
              id="symbolInput"
              name="symbol"
              type="text"
              placeholder="例如 NVDA、AMZN、MSFT、AAPL"
              autocomplete="off"
            />
            <button type="submit" aria-label="查看股票">查看</button>
            <button class="ghost-button" type="button" id="shareButton">复制链接</button>
          </div>
          <p class="data-status" id="dataStatus">正在连接行情数据...</p>
          <div class="chips" id="quickSymbols" aria-label="常用股票"></div>
        </form>

        <section class="dashboard-grid">
          <article class="quote-panel">
            <div class="quote-header">
              <div>
                <p class="muted">当前股票</p>
                <h2 id="companyName">--</h2>
              </div>
              <span class="symbol-pill" id="symbolPill">--</span>
            </div>

            <div class="price-row">
              <strong id="currentPrice">--</strong>
              <span id="priceChange">--</span>
            </div>

            <div class="stat-grid">
              <div>
                <span>价格百分位</span>
                <strong id="percentile">--</strong>
              </div>
              <div>
                <span>状态</span>
                <strong id="valuationState">--</strong>
              </div>
              <div>
                <span>市值</span>
                <strong id="marketCap">--</strong>
              </div>
              <div>
                <span>波动率</span>
                <strong id="volatility">--</strong>
              </div>
            </div>
          </article>

          <article class="chart-panel">
            <div class="panel-title">
              <h2>价格折线</h2>
              <span id="chartRange">近 3 个月</span>
            </div>
            <canvas id="trendChart" width="720" height="330"></canvas>
          </article>
        </section>
      </section>

      <section class="section-panel">
        <div class="panel-title">
          <div>
            <h2>当前横截面</h2>
            <p>基于最新行情与近 3 个月价格区间</p>
          </div>
          <span id="tableHint">输入代码后可生成分享链接</span>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>公司</th>
                <th>当前值</th>
                <th>百分位</th>
                <th>状态</th>
              </tr>
            </thead>
            <tbody id="comparisonRows"></tbody>
          </table>
        </div>
      </section>

      <section class="section-panel compact">
        <div class="panel-title">
          <h2>分析摘要</h2>
          <span id="riskTag">--</span>
        </div>
        <p id="analysisText" class="analysis-text">--</p>
      </section>
    </main>

    <script>
const palette = ["#75a2ff", "#ffd85a", "#8ee76e", "#ff8d75", "#c78cff", "#66e3d0"];
const defaultSymbols = ["NVDA", "AMZN", "MSFT", "AAPL", "TSLA"];

const form = document.querySelector("#stockForm");
const input = document.querySelector("#symbolInput");
const quickSymbols = document.querySelector("#quickSymbols");
const canvas = document.querySelector("#trendChart");
const ctx = canvas.getContext("2d");
const shareButton = document.querySelector("#shareButton");
const dataStatus = document.querySelector("#dataStatus");

const state = {
  activeSymbol: new URLSearchParams(window.location.search).get("symbol") || "NVDA",
  quotes: new Map(),
  symbols: [...defaultSymbols],
  isLoading: false,
};

function normalizeSymbol(symbol) {
  return symbol.trim().toUpperCase();
}

function getState(percentile) {
  if (!Number.isFinite(percentile)) return "观察";
  if (percentile < 30) return "低位";
  if (percentile < 70) return "中性";
  return "高位";
}

function getStatusClass(status) {
  if (status === "低位") return "status-low";
  if (status === "中性" || status === "观察") return "status-mid";
  return "status-high";
}

function formatPercent(value) {
  if (!Number.isFinite(value)) return "--";
  return `${value.toFixed(1)}%`;
}

function formatPrice(value, currency) {
  if (!Number.isFinite(value)) return "--";
  return `${value.toFixed(2)}${currency ? ` ${currency}` : ""}`;
}

function setLoading(isLoading, message) {
  state.isLoading = isLoading;
  form.querySelector("button[type='submit']").disabled = isLoading;
  dataStatus.textContent = message;
}

function enrichQuote(quote, index) {
  const percentile = Number.isFinite(quote.percentile) ? quote.percentile : 50;
  return {
    ...quote,
    color: palette[index % palette.length],
    state: quote.state || getState(percentile),
    percentile,
    volatilityText: Number.isFinite(quote.volatility) ? `${quote.volatility.toFixed(1)}%` : "--",
    cap: quote.cap || "--",
    trend: quote.trend?.length ? quote.trend : [quote.price].filter(Number.isFinite),
  };
}

async function fetchQuotes(symbols) {
  const uniqueSymbols = [...new Set(symbols.map(normalizeSymbol).filter(Boolean))];
  const response = await fetch(
    `/api/quote?symbols=${encodeURIComponent(uniqueSymbols.join(","))}&t=${Date.now()}`,
    { cache: "no-store" },
  );
  const payload = await response.json();

  if (!response.ok) {
    throw new Error(payload.error || "行情数据请求失败");
  }

  return payload;
}

function drawChart(stock) {
  const ratio = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = Math.floor(rect.width * ratio);
  canvas.height = Math.floor(rect.height * ratio);
  ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
  ctx.clearRect(0, 0, rect.width, rect.height);

  const values = stock.trend.filter(Number.isFinite);
  if (values.length < 2) {
    ctx.fillStyle = "rgba(214, 226, 255, 0.68)";
    ctx.font = "15px system-ui";
    ctx.fillText("暂无足够折线数据", 28, 42);
    return;
  }

  const padding = { top: 18, right: 18, bottom: 28, left: 44 };
  const min = Math.min(...values) * 0.98;
  const max = Math.max(...values) * 1.02;
  const range = max - min || 1;
  const width = rect.width - padding.left - padding.right;
  const height = rect.height - padding.top - padding.bottom;

  ctx.strokeStyle = "rgba(190, 210, 255, 0.16)";
  ctx.lineWidth = 1;

  for (let i = 0; i < 4; i += 1) {
    const y = padding.top + (height / 3) * i;
    ctx.beginPath();
    ctx.moveTo(padding.left, y);
    ctx.lineTo(rect.width - padding.right, y);
    ctx.stroke();
  }

  const points = values.map((value, index) => {
    const x = padding.left + (width / (values.length - 1)) * index;
    const y = padding.top + height - ((value - min) / range) * height;
    return { x, y };
  });

  const gradient = ctx.createLinearGradient(0, padding.top, 0, rect.height - padding.bottom);
  gradient.addColorStop(0, `${stock.color}66`);
  gradient.addColorStop(1, `${stock.color}00`);

  ctx.beginPath();
  points.forEach((point, index) => {
    if (index === 0) ctx.moveTo(point.x, point.y);
    else ctx.lineTo(point.x, point.y);
  });
  ctx.lineTo(points.at(-1).x, rect.height - padding.bottom);
  ctx.lineTo(points[0].x, rect.height - padding.bottom);
  ctx.closePath();
  ctx.fillStyle = gradient;
  ctx.fill();

  ctx.beginPath();
  points.forEach((point, index) => {
    if (index === 0) ctx.moveTo(point.x, point.y);
    else ctx.lineTo(point.x, point.y);
  });
  ctx.strokeStyle = stock.color;
  ctx.lineWidth = 3;
  ctx.lineJoin = "round";
  ctx.lineCap = "round";
  ctx.stroke();

  points.forEach((point, index) => {
    const step = Math.max(1, Math.floor(points.length / 8));
    if (index % step !== 0 && index !== points.length - 1) return;
    ctx.beginPath();
    ctx.arc(point.x, point.y, 4, 0, Math.PI * 2);
    ctx.fillStyle = "#eef4ff";
    ctx.fill();
    ctx.beginPath();
    ctx.arc(point.x, point.y, 2.4, 0, Math.PI * 2);
    ctx.fillStyle = stock.color;
    ctx.fill();
  });
}

function renderChips() {
  quickSymbols.innerHTML = state.symbols
    .map(
      (symbol) =>
        `<button class="chip ${symbol === state.activeSymbol ? "active" : ""}" type="button" data-symbol="${symbol}">${symbol}</button>`,
    )
    .join("");
}

function renderComparison() {
  const stocks = [...state.quotes.values()].sort((a, b) => a.percentile - b.percentile);
  document.querySelector("#comparisonRows").innerHTML = stocks
    .map((stock) => {
      const isActive = stock.symbol === state.activeSymbol;
      return `
        <tr>
          <td>
            <div class="company-cell" style="color:${stock.color}">
              <span class="dot" style="background:${stock.color}"></span>
              ${stock.name}${isActive ? " · 当前" : ""}
            </div>
          </td>
          <td>${Number.isFinite(stock.price) ? stock.price.toFixed(2) : "--"}</td>
          <td class="percent">${formatPercent(stock.percentile)}</td>
          <td class="${getStatusClass(stock.state)}">${stock.state}</td>
        </tr>
      `;
    })
    .join("");
}

function renderAnalysis(stock) {
  const changeWord = stock.change >= 0 ? "上涨" : "下跌";
  const changeText = Number.isFinite(stock.change)
    ? `今日${changeWord} ${Math.abs(stock.change).toFixed(2)}%`
    : "今日涨跌幅暂不可用";
  const statusText =
    stock.state === "低位"
      ? "价格处在近 3 个月较低区间，适合继续观察是否有基本面催化。"
      : stock.state === "中性"
        ? "价格位于近 3 个月中性区域，更适合结合盈利增速和行业景气度判断。"
        : stock.state === "高位"
          ? "价格百分位偏高，短期需要更关注回撤风险和预期兑现。"
          : "当前数据不足，建议稍后刷新或换一个代码查看。";

  document.querySelector("#analysisText").textContent =
    `${stock.symbol} 当前价格为 ${formatPrice(stock.price, stock.currency)}，${changeText}。` +
    `价格百分位为 ${formatPercent(stock.percentile)}，状态为“${stock.state}”。${statusText}`;
  document.querySelector("#riskTag").textContent =
    stock.state === "高位" ? "风险偏高" : stock.state === "中性" ? "中性观察" : "低位观察";
}

function renderActiveStock() {
  const stock = state.quotes.get(state.activeSymbol);
  if (!stock) return;

  document.querySelector("#companyName").textContent = stock.name;
  document.querySelector("#symbolPill").textContent = stock.symbol;
  document.querySelector("#currentPrice").textContent = Number.isFinite(stock.price)
    ? stock.price.toFixed(2)
    : "--";
  const priceChange = document.querySelector("#priceChange");
  priceChange.textContent = Number.isFinite(stock.change)
    ? `${stock.change >= 0 ? "+" : ""}${stock.change.toFixed(2)}%`
    : "--";
  priceChange.classList.toggle("negative", stock.change < 0);
  document.querySelector("#percentile").textContent = formatPercent(stock.percentile);
  document.querySelector("#valuationState").textContent = stock.state;
  document.querySelector("#valuationState").className = getStatusClass(stock.state);
  document.querySelector("#marketCap").textContent = stock.cap;
  document.querySelector("#volatility").textContent = stock.volatilityText;
  document.querySelector("#todayLabel").textContent = new Intl.DateTimeFormat("zh-CN", {
    month: "numeric",
    day: "numeric",
  }).format(new Date());

  renderChips();
  renderComparison();
  renderAnalysis(stock);
  drawChart(stock);
}

function syncUrl() {
  const url = new URL(window.location.href);
  url.searchParams.set("symbol", state.activeSymbol);
  window.history.replaceState({}, "", url);
}

async function loadDashboard(symbol) {
  const normalized = normalizeSymbol(symbol) || "NVDA";
  state.activeSymbol = normalized;

  if (!state.symbols.includes(normalized)) {
    state.symbols = [normalized, ...state.symbols].slice(0, 8);
  }

  input.value = normalized;
  syncUrl();
  renderChips();
  setLoading(true, "正在获取最新行情...");

  try {
    const symbols = [normalized, ...defaultSymbols].slice(0, 8);
    const payload = await fetchQuotes(symbols);
    state.quotes = new Map(
      payload.quotes.map((quote, index) => {
        const enriched = enrichQuote(quote, index);
        return [enriched.symbol, enriched];
      }),
    );
    if (!state.quotes.has(state.activeSymbol)) {
      throw new Error(`没有找到 ${state.activeSymbol} 的行情，请检查代码是否正确`);
    }
    state.symbols = [...state.quotes.keys()];
    renderActiveStock();

    const active = state.quotes.get(state.activeSymbol);
    const updatedAt = active?.updatedAt
      ? new Intl.DateTimeFormat("zh-CN", {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        }).format(new Date(active.updatedAt))
      : "--";
    setLoading(false, `已更新 ${updatedAt} · 免费行情可能存在延迟`);
  } catch (error) {
    setLoading(false, `行情获取失败：${error.message}`);
  }
}

form.addEventListener("submit", (event) => {
  event.preventDefault();
  loadDashboard(input.value);
});

quickSymbols.addEventListener("click", (event) => {
  const button = event.target.closest("[data-symbol]");
  if (!button) return;
  loadDashboard(button.dataset.symbol);
});

shareButton.addEventListener("click", async () => {
  syncUrl();
  try {
    await navigator.clipboard.writeText(window.location.href);
    dataStatus.textContent = "分享链接已复制";
  } catch {
    dataStatus.textContent = window.location.href;
  }
});

window.addEventListener("resize", () => renderActiveStock());

input.value = state.activeSymbol;
loadDashboard(state.activeSymbol);

</script>
  </body>
</html>
